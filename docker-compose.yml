version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=botwala
      - N8N_BASIC_AUTH_PASSWORD=BotWala@2024
      - NODE_ENV=production
      - WEBHOOK_URL=https://${RENDER_EXTERNAL_URL}
      - GENERIC_OAUTH_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
    driver: local
